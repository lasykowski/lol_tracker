services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: wielki_challange_backend:v2
    container_name: wielki_challange_backend
    restart: unless-stopped
    environment:
      PORT: "3001"
      DATABASE_URL: "file:/app/data/dev.db"
      # ZMIEŃ poniższe na swój prawdziwy klucz Riot API
      RIOT_API_KEY: "RGAPI-6f343882-66aa-4889-b9c5-24666b8a96d8"
      DEFAULT_REGION: "euw1"
      ROUTING_REGION: "europe"
    volumes:
      # Trwałe miejsce dla bazy SQLite
      - backend_data:/app/data
    ports:
      - "3001:3001"
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: wielki_challange_frontend:v2
    container_name: wielki_challange_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: "production"
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  backend_data:
    driver: local

networks:
  app_network:
    driver: bridge
