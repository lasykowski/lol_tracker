services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wielki_challange_backend
    restart: unless-stopped
    environment:
      PORT: "3001"
      DATABASE_URL: "file:///app/data/dev.db"
      # ZMIEŃ poniższe na swój prawdziwy klucz Riot API
      RIOT_API_KEY: ${RIOT_API_KEY}
      DEFAULT_REGION: "euw1"
      ROUTING_REGION: "europe"
    volumes:
      # Trwałe miejsce dla bazy SQLite
      - backend_data:/app/data
    ports:
      - "3001:3001"
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wielki_challange_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: "production"
      BACKEND_URL: "http://backend:3001"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  backend_data:
    driver: local

networks:
  app_network:
    driver: bridge
